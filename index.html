<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c2d6b">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="Habilitação">

if ('serviceWorker' in navigator) {

<body>

<header class="header">
    <div class="header-top">
        <button class="back-btn">
    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
</button>
        <div class="header-text">
            <h1>HABILITAÇÃO</h1>
            <span id="data-atualizacao">Atualizado em: carregando...</span>
        </div>
    </div>
</header>

<main class="content">
    <div class="aviso-vio">
        Verifique autenticidade do QR Code com o app <a href="#">Vio</a>
    </div>

    <div class="carousel">

    <!-- CAROUSEL -->
    <div class="carousel">
    <div class="carousel-track">
        <img src="images/image1.jpg" alt="">
        <img src="images/image2.jpg" alt="">
        <img src="images/image3.jpg" alt="">
        <img src="images/image4.jpeg" alt="">

</div>

<div class="dots">
    <span class="dot active"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
</div>

    <div class="actions">

    <button class="action-btn">
        <span class="icon">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6"/><path d="M22 11h-6"/></svg>
        </span>
        </span>
        Histórico de emissões da CNH
    </button>

    <button class="action-btn">
        <span class="icon">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>

        <span class="icon">

        </span>
        Remover

    <button class="action-btn">
        <span class="icon">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </span>
        Copiar QR Code
    </button>

</div>

</main>

<script src="script.js"></script>
